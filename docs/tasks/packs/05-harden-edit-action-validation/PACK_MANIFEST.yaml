pack_id: 05-harden-edit-action-validation
name: Harden Edit Action Validation
version: 1
created_by: chatgpt

entrypoint: TASK_PLAN.md
workspace_root: .
default_max_steps: 8
agent_mode: bounded_markdown_contract

folders:
  inbox: inbox
  scripts: scripts
  task_scripts: task-scripts
  snippets: snippets

execution_mode: sequential_first

global_constraints:
  - never edit files outside each task allowed_files
  - do not auto-run scripts from scripts/
  - do not modify repository source files when an action is incomplete
  - prefer the smallest targeted edit over full-file rewrites

requires:
  - go
  - git
  - bash

validation:
  - go test ./internal/...
  - go test ./...

rules:
  max_allowed_files: 8
  require_validation: true
  require_branch: true
  stop_on_failure: true
